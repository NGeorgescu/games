<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pi Word Builder — Major System</title>
<style>
  :root{ --bg:#0e1014; --panel:#171a21; --ink:#eef1f6; --muted:#9aa3b2; --line:#262b35; --accent:#7cc6ff; --good:#7ee0a3; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:16px 16px 60px}
  h1{font-size:22px;margin:.2em 0}
  .sub{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 14px}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0}
  input,textarea{background:#10141b;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 10px;font-family:ui-monospace,monospace;font-size:13px}
  input.grow{flex:1;min-width:180px}
  button{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:13px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.pri{background:var(--accent);color:#06243a;border-color:var(--accent);font-weight:700}
  button.good{background:var(--good);color:#063a1f;border-color:var(--good);font-weight:700}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:10px 0}
  .prog{color:var(--muted);font-size:13px;margin-bottom:6px}
  .prog b{color:var(--ink)}
  .strip{font-family:ui-monospace,monospace;font-size:15px;line-height:1.9;word-break:break-all}
  .strip .cov{color:var(--good)}
  .strip .cur{background:var(--accent);color:#06243a;border-radius:2px;padding:0 1px}
  .strip .rest{color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{background:#10141b;border:1px solid var(--line);border-radius:8px;padding:4px 8px;font-size:13px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
  .chip:hover{border-color:#ff8a8a}
  .chip .cc{color:var(--muted);font-family:ui-monospace,monospace;font-size:11px}
  .chip.conc{border-color:#2f6b46}
  .empty{color:var(--muted);font-size:13px}
  .grp{margin:10px 0 2px}
  .grp .ghead{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin:2px 0 6px}
  .grp .ghead .k{color:var(--accent);font-family:ui-monospace,monospace;text-transform:none}
  .opts{display:flex;flex-wrap:wrap;gap:6px}
  .opt{background:#10141b;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:14px;cursor:pointer}
  .opt:hover{border-color:var(--accent);background:#16202b}
  .opt.conc{font-weight:700;border-color:#2f6b46}
  .opt .oc{color:var(--muted);font-family:ui-monospace,monospace;font-size:11px;margin-left:5px}
  .done{color:var(--good);font-weight:700}
  .warn{color:#ff8a8a;font-size:13px;min-height:18px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  details{margin-top:8px}
  summary{cursor:pointer;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Pi Word Builder <span class="mono" style="color:var(--muted);font-size:14px">— Major System</span></h1>
  <p class="sub">Click words to encode a number into memorable words. Options are grouped by <b>how many digits each word captures</b> (most first). Every word is “clean” — spelling matches sound. <b>Bold</b> = concrete/picturable.</p>

  <div class="card">
    <div class="row">
      <input id="target" class="grow mono" spellcheck="false">
      <button onclick="app.loadTarget()">Load number</button>
      <button onclick="app.reset()">Reset picks</button>
    </div>
    <div class="row">
      <input id="resume" class="grow mono" placeholder="paste a word list here to resume…" spellcheck="false">
      <button onclick="app.loadWords()">Load words</button>
    </div>
    <div class="warn" id="warn"></div>
  </div>

  <div class="card">
    <div class="prog" id="prog"></div>
    <div class="strip" id="strip"></div>
    <div class="toolbar">
      <button id="backBtn" onclick="app.back()">◀ Back</button>
      <button id="fwdBtn" onclick="app.forward()">Forward ▶</button>
      <button class="good" onclick="app.copy()">Copy words</button>
      <span id="copied" class="empty"></span>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="card">
    <div id="options"></div>
  </div>
</div>

const $ = id => document.getElementById(id);
// derive word -> digits
const W2D = {};
for(const c in DATA.byd){ for(const w of DATA.byd[c]) if(!(w in W2D)) W2D[w]=c; }
const CONC = new Set(DATA.conc);
const MAXPER = 40;   // cap words shown per capture-length group

const app = {
  target: DATA.pi,
  picks: [],      // [{word, chunk}]
  redo: [],       // undone picks for Forward

  init(){ $("target").value = DATA.pi; this.render(); },
  get pos(){ return this.picks.reduce((n,p)=>n+p.chunk.length, 0); },

  loadTarget(){
    const t = $("target").value.replace(/[^0-9]/g,"");
    if(!t){ this.warn("Enter some digits."); return; }
    this.target=t; this.picks=[]; this.redo=[]; this.warn(""); this.render();
  },
  reset(){ this.picks=[]; this.redo=[]; this.warn(""); this.render(); },

  loadWords(){
    const words = $("resume").value.trim().toLowerCase().split(/[^a-z]+/).filter(Boolean);
    if(!words.length){ this.warn("Paste a space-separated word list."); return; }
    const picks=[]; let pos=0;
    for(const w of words){
      const c=W2D[w];
      if(!c){ this.warn(`“${w}” is not in the clean dictionary.`); return; }
      if(this.target.slice(pos,pos+c.length)!==c){
        this.warn(`“${w}” (${c}) doesn’t match the number at digit ${pos+1}.`); return; }
      picks.push({word:w,chunk:c}); pos+=c.length;
    }
    this.picks=picks; this.redo=[]; this.warn(""); this.render();
  },

  pick(word,chunk){ this.picks.push({word,chunk}); this.redo=[]; this.render(); },
  back(){ if(this.picks.length){ this.redo.push(this.picks.pop()); this.render(); } },
  forward(){ if(this.redo.length){ this.picks.push(this.redo.pop()); this.render(); } },
  jumpTo(i){ // truncate so only first i picks remain (click a chip)
    while(this.picks.length>i) this.redo.push(this.picks.pop());
    this.render();
  },
  copy(){
    const s=this.picks.map(p=>p.word).join(" ");
    navigator.clipboard && navigator.clipboard.writeText(s);
    $("copied").textContent = s ? "copied ✓" : "(nothing to copy)";
    setTimeout(()=>$("copied").textContent="",1500);
  },
  warn(m){ $("warn").textContent=m; },

  render(){
    const pos=this.pos, T=this.target;
    $("prog").innerHTML = `digit <b>${pos}</b> / ${T.length} &nbsp;·&nbsp; ${this.picks.length} words` +
      (pos>=T.length ? ` &nbsp;<span class="done">✓ complete</span>` : "");
    // strip
    const cur = pos<T.length ? `<span class="cur">${T[pos]}</span>` : "";
    $("strip").innerHTML = `<span class="cov">${T.slice(0,pos)}</span>${cur}<span class="rest">${T.slice(pos+1)}</span>`;
    // chips
    $("chips").innerHTML = this.picks.map((p,i)=>
      `<span class="chip${CONC.has(p.word)?" conc":""}" title="click to go back to here" onclick="app.jumpTo(${i})">${p.word}<span class="cc">${p.chunk}</span></span>`).join("")
      || `<span class="empty">no words yet — pick from below</span>`;
    $("backBtn").disabled = !this.picks.length;
    $("fwdBtn").disabled = !this.redo.length;
    $("fwdBtn").textContent = this.redo.length ? `Forward ▶ (${this.redo[this.redo.length-1].word})` : "Forward ▶";
    // options grouped by capture length, most digits first
    const box=$("options");
    if(pos>=T.length){ box.innerHTML=`<div class="done">Done — every digit is covered. Hit “Copy words”.</div>`; return; }
    let html="", any=false;
    for(let L=6;L>=1;L--){
      const chunk=T.slice(pos,pos+L);
      if(chunk.length<L) continue;
      const ws=DATA.byd[chunk];
      if(!ws || !ws.length) continue;
      any=true;
      const sorted=[...ws].sort((a,b)=>(CONC.has(b)?1:0)-(CONC.has(a)?1:0)); // concrete first, else keep freq order
      const shown=sorted.slice(0,MAXPER);
      html += `<div class="grp"><div class="ghead">captures ${L} digit${L>1?"s":""} · <span class="k">${chunk}</span></div><div class="opts">` +
        shown.map(w=>`<button class="opt${CONC.has(w)?" conc":""}" onclick="app.pick('${w}','${chunk}')">${w}<span class="oc">${chunk}</span></button>`).join("") +
        (sorted.length>MAXPER ? `<span class="empty">+${sorted.length-MAXPER} more…</span>`:"") +
        `</div></div>`;
    }
    box.innerHTML = any ? html : `<div class="empty">No clean word matches the next digits. Try a single-digit word above, or Back up.</div>`;
  }
};
app.init();
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
  if(e.key==="ArrowLeft") app.back();
  else if(e.key==="ArrowRight") app.forward();
});
</script>
