<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mental Math</title>
<style>
  :root{ --bg:#0e1014; --panel:#171a21; --ink:#eef1f6; --muted:#9aa3b2; --line:#262b35; --accent:#7cc6ff; --good:#7ee0a3; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  .wrap{max-width:460px;margin:0 auto;padding:16px 16px 40px}
  h1{font-size:24px;margin:.1em 0}
  .sub{color:var(--muted);font-size:13px;line-height:1.55;margin:0 0 16px}
  .cat{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin:16px 0 6px}
  a.tile,button.tile{display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);
    border-radius:13px;padding:13px 14px;margin-bottom:9px;text-decoration:none;color:var(--ink);cursor:pointer}
  .tile b{font-size:16px}
  .tile span{display:block;color:var(--muted);font-size:12.5px;margin-top:2px;line-height:1.4}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .back{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;
    width:40px;height:40px;font-size:18px;cursor:pointer;flex:0 0 auto}
  .top h2{font-size:18px;margin:0}
  .lesson{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;line-height:1.6;font-size:14.5px}
  .lesson h3{margin:.6em 0 .4em;font-size:15px}
  .lesson h3:first-child{margin-top:.1em}
  .lesson p{margin:.5em 0}
  .lesson ul{margin:.5em 0;padding-left:20px}
  .lesson li{margin:.35em 0}
  .lesson .why{color:var(--muted);font-size:12.5px;font-style:italic;border-left:2px solid var(--line);padding-left:10px;margin:9px 0;line-height:1.55}
  .lesson .ex{background:#10141b;border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;margin:10px 0}
  .lesson code,.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
  .lesson table{border-collapse:collapse;margin:8px 0;font-family:ui-monospace,monospace;font-size:13px}
  .lesson td{border:1px solid var(--line);padding:3px 8px;text-align:center}
  .map td:first-child{color:var(--muted)}
  button.go{appearance:none;border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:700;
    background:var(--accent);color:#06243a;width:100%;margin-top:12px;cursor:pointer}
  button.go.alt{background:var(--good);color:#063a1f}

  .scoreline{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin:2px 0 10px}
  .scoreline b{color:var(--ink)}
  .prob{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 14px;text-align:center;margin-bottom:10px}
  .qtext{font-size:30px;font-weight:800;font-family:ui-monospace,Menlo,monospace;letter-spacing:.5px;word-break:break-all}
  .ans{margin-top:12px;min-height:42px;font-size:30px;font-weight:800;font-family:ui-monospace,monospace;
    border-bottom:2px solid var(--line);display:inline-block;min-width:120px;padding:2px 10px}
  .ans.empty{color:#3a4150}
  .fb{min-height:22px;text-align:center;font-size:14px;margin:8px 0;font-weight:600}
  .fb.ok{color:var(--good)} .fb.bad{color:#ff8a8a}
  .steps{background:#10141b;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:6px 0 2px;
    font-size:13.5px;line-height:1.7;display:none}
  .steps.show{display:block}
  .steps ol{margin:0;padding-left:20px} .steps li{margin:3px 0}
  .steps .mono{color:#cfe6ff}
  .pick{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
  .picknum{background:var(--accent);color:#06243a;border:0;border-radius:10px;padding:14px 0;font-size:18px;font-weight:700;cursor:pointer}
  .picknum:active{filter:brightness(.92)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:8px}
  .daypad{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:8px}
  .key.day{font-size:15px;padding:16px 0}
  .key.right{background:#16462a;border-color:#2fe06a;color:#dffbe8}
  .key.wrongkey{background:#4a1d1d;border-color:#ff6b6b;color:#ffd9d9}
  .key{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:12px;
    font-size:22px;font-weight:700;padding:16px 0;cursor:pointer;user-select:none}
  .key:active{background:#222a36}
  .key.wide{font-size:17px}
  .key.check{background:var(--good);color:#063a1f;border-color:var(--good)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <section id="home">
    <h1>Mental Math</h1>
    <p class="sub">Learn the “Human Calculator” tricks — then drill them. Each trick has a quick lesson and a
    practice mode that shows you the steps on every problem.</p>
    <div id="trickList"></div>
  </section>

  <!-- LESSON -->
  <section id="lesson" class="hidden">
    <div class="top"><button class="back" onclick="app.home()">←</button><h2 id="lessonTitle"></h2></div>
    <div class="lesson" id="lessonBody"></div>
    <button class="go alt" id="lessonGo" onclick="app.practice()">Practice →</button>
  </section>

  <!-- PRACTICE -->
  <section id="practice" class="hidden">
    <div class="top"><button class="back" onclick="app.lesson(app.cur.id)">←</button><h2 id="practiceTitle"></h2></div>
    <div class="scoreline"><span><b id="scCorrect">0</b>/<b id="scTotal">0</b> correct</span><span>streak <b id="scStreak">0</b> · best <b id="scBest">0</b></span></div>
    <div class="prob">
      <div class="qtext" id="qtext">—</div>
      <div class="ans empty" id="ans">—</div>
    </div>
    <div class="fb" id="fb"></div>
    <div class="steps" id="steps"></div>
    <div id="keypad"></div>
    <button class="go hidden" id="nextBtn" onclick="app.next()">Next →</button>
  </section>

</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
function show(id){ for(const s of ["home","lesson","practice"]) $(s).classList.add("hidden"); $(id).classList.remove("hidden"); window.scrollTo(0,0); }
const rnd = (lo,hi) => lo + Math.floor(Math.random()*(hi-lo+1));
const commas = n => n.toLocaleString("en-US");
const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
// independent weekday grader (Zeller's congruence) → 0=Sun … 6=Sat
function dow(y,m,d){
  if(m<3){ m+=12; y-=1; }
  const K=y%100, J=Math.floor(y/100);
  const h=(d + Math.floor(13*(m+1)/5) + K + Math.floor(K/4) + Math.floor(J/4) + 5*J) % 7; // Zeller: 0=Sat
  return (h+6)%7;   // re-base to 0=Sun
}

/* ---- shared reference data (all verified by brute force) ---- */
const CUBE_UNITS = {0:0,1:1,8:2,7:3,4:4,5:5,6:6,3:7,2:8,9:9};   // last digit of cube -> units of root
const CUBES  = [0,1,8,27,64,125,216,343,512,729];               // n^3, n=0..9
const FIFTHS = [0,1,32,243,1024,3125,7776,16807,32768,59049];   // n^5, n=0..9
function largestIdx(table, val){ let k=0; for(let t=0;t<=9;t++) if(table[t]<=val) k=t; return k; }

function timesSteps(a,b){
  const s=[`${a} × ${b} = <span class="mono">${a*b}</span>`];
  const has=x=>a===x||b===x, other=x=>a===x?b:a;
  if(has(9))      s.push(`×9 tip: ${other(9)}×10 − ${other(9)} = ${other(9)*10}−${other(9)} = ${other(9)*9}`);
  else if(has(5)) s.push(`×5 tip: ${other(5)}×10 ÷ 2 = ${other(5)*10}÷2 = ${other(5)*5}`);
  else if(has(4)) s.push(`×4 tip: double ${other(4)} twice → ${other(4)*2} → ${other(4)*4}`);
  else if(has(6)) s.push(`×6 tip: ×3 then double → ${other(6)*3} → ${other(6)*6}`);
  return s;
}

/* ---- the tricks ---- */
const TRICKS = [
  { id:"times", cat:"2-digit multiplication", name:"Times tables", tag:"Single-digit recall, the bedrock of everything",
    lesson:`<h3>Make recall automatic</h3>
      <p>Every other trick leans on instant single-digit products. Drill these until they're reflex. A few patterns help:</p>
      <p><b>×9:</b> do ×10 and subtract the number. 7×9 = 70−7 = 63. (Bonus: the two digits of any ×9 answer add to 9.)</p>
      <p><b>×5:</b> do ×10, then halve. 8×5 = 80÷2 = 40.</p>
      <p><b>×4:</b> double twice. 7×4 → 14 → 28. &nbsp; <b>×8:</b> double three times.</p>
      <div class="ex mono">6 × 7 = 42 · 8 × 9 = 72 · 4 × 9 = 36</div>`,
    gen(){ const a=rnd(2,9), b=rnd(2,9); return { q:`${a} × ${b}`, a:a*b, steps:timesSteps(a,b) }; } },

  { id:"tables", cat:"2-digit multiplication", name:"Times table for a number", tag:"Pick 11–20 and drill it up to N×N", picker:true },

  { id:"x11", cat:"2-digit multiplication", name:"Multiply by 11", tag:"Split the digits, drop the sum between",
    lesson:`<h3>× 11 in one move</h3>
      <p>For a 2-digit number, <b>pull the digits apart and put their sum in the middle.</b></p>
      <div class="ex mono">35 × 11 → 3 _ 5, &nbsp;3+5=8 → <b>385</b></div>
      <p>If the middle sum is 10 or more, <b>carry the 1</b> into the left digit:</p>
      <div class="ex mono">57 × 11 → 5 _ 7, &nbsp;5+7=12 → carry → (5+1)(2)(7) = <b>627</b></div>`,
    gen(){ const n=rnd(10,99), a=(n/10|0), b=n%10, s=a+b; const steps=[
        `Split <span class="mono">${n}</span> → <span class="mono">${a} _ ${b}</span>`,
        `Middle = ${a}+${b} = <span class="mono">${s}</span>`,
        s<10 ? `No carry → <span class="mono">${a}${s}${b}</span> = <b>${n*11}</b>`
             : `${s}≥10, carry 1 → (${a}+1)(${s-10})(${b}) = <b>${n*11}</b>` ];
      return { q:`${n} × 11`, a:n*11, steps }; } },

  { id:"sq5", cat:"2-digit multiplication", name:"Square a number ending in 5", tag:"a·(a+1) then tack on 25",
    lesson:`<h3>Squaring n5</h3>
      <p>Take the tens digit <b>a</b>, multiply by <b>(a+1)</b>, and write <b>25</b> after it.</p>
      <div class="ex mono">35² → 3×4 = 12 → <b>1225</b><br>85² → 8×9 = 72 → <b>7225</b></div>
      <p>Works because (10a+5)² = 100·a·(a+1) + 25.</p>`,
    gen(){ const a=rnd(1,9), n=a*10+5; return { q:`${n}²`, a:n*n, steps:[
        `Tens digit a = <span class="mono">${a}</span>`,
        `a × (a+1) = ${a} × ${a+1} = <span class="mono">${a*(a+1)}</span>`,
        `Tack on 25 → <b>${a*(a+1)}25</b>` ]}; } },

  { id:"squareany", cat:"2-digit multiplication", name:"Square any 2-digit number", tag:"(a−d)(a+d) + d² — round to the nearest ten",
    lesson:`<h3>Square any two-digit number</h3>
      <p>Use <b>a² = (a−d)(a+d) + d²</b>, where <b>d</b> is the distance to the nearest ten. One factor becomes a round number.</p>
      <div class="ex mono">47² → nearest ten 50, d = 3<br>(47−3)(47+3) + 3² = 44 × 50 + 9<br>= 2200 + 9 = <b>2209</b></div>
      <p>Round numbers multiply instantly — you just add a small square on top.</p>
      <p class="why">It works because (a−d)(a+d) = a² − d², so adding d² back gives a² exactly. Pick d to land one factor on a multiple of ten.</p>`,
    gen(){ let a; do{ a=rnd(11,99); }while(a%10===0||a%10===5);
      const u=a%10, d=Math.min(u,10-u), lo=a-d, hi=a+d;
      return { q:`${a}²`, a:a*a, steps:[
        `Nearest ten is ${u<5?lo:hi} → d = <span class="mono">${d}</span>`,
        `(${a}−${d})(${a}+${d}) = ${lo} × ${hi} = <span class="mono">${lo*hi}</span>`,
        `+ ${d}² = + <span class="mono">${d*d}</span>`,
        `= <b>${a*a}</b>` ]}; } },

  { id:"cross", cat:"2-digit multiplication", name:"Cross method (any 2×2)", tag:"Units, cross, hundreds — the general trick",
    lesson:`<h3>Vertically &amp; crosswise</h3>
      <p>For <span class="mono">ab × cd</span>, build the answer in three pieces (carry as you go):</p>
      <p>1. <b>Units</b> = b×d &nbsp; 2. <b>Cross</b> = a×d + b×c &nbsp; 3. <b>Hundreds</b> = a×c</p>
      <div class="ex mono">23 × 47<br>units 3×7 = 21 → write 1, carry 2<br>cross 2×7 + 3×4 = 26, +2 = 28 → write 8, carry 2<br>hund 2×4 = 8, +2 = 10<br>= <b>1081</b></div>`,
    gen(){ const x=rnd(11,99), y=rnd(11,99), a=(x/10|0),b=x%10,c=(y/10|0),d=y%10;
      return { q:`${x} × ${y}`, a:x*y, steps:[
        `Units: b×d = ${b}×${d} = <span class="mono">${b*d}</span>`,
        `Cross: a×d + b×c = ${a}×${d} + ${b}×${c} = ${a*d}+${b*c} = <span class="mono">${a*d+b*c}</span>`,
        `Hundreds: a×c = ${a}×${c} = <span class="mono">${a*c}</span>`,
        `Combine 100·${a*c} + 10·${a*d+b*c} + ${b*d} = <b>${x*y}</b>` ]}; } },

  { id:"diffsq", cat:"2-digit multiplication", name:"Difference of squares", tag:"When the two numbers share parity",
    lesson:`<h3>Meet in the middle</h3>
      <p>If both numbers are odd, or both even, their product is <b>midpoint² − halfgap²</b>.</p>
      <div class="ex mono">23 × 17 → midpoint 20, gap/2 = 3 → 20² − 3² = 400 − 9 = <b>391</b></div>
      <p>Best when the midpoint is a round number you can square instantly.</p>`,
    gen(){ const m=rnd(13,87); const maxd=Math.min(9, m-11, 99-m); const d=rnd(1,Math.max(1,maxd));
      const a=m-d, b=m+d; return { q:`${a} × ${b}`, a:a*b, steps:[
        `Same parity → midpoint = (${a}+${b})/2 = <span class="mono">${m}</span>`,
        `Half-gap = (${b}−${a})/2 = <span class="mono">${d}</span>`,
        `${m}² − ${d}² = ${m*m} − ${d*d} = <b>${a*b}</b>` ]}; } },

  { id:"roundup", cat:"2-digit multiplication", name:"Round up & subtract", tag:"When a number ends in 8 or 9",
    lesson:`<h3>Round up, then subtract</h3>
      <p>When a number ends in <b>8 or 9</b> — just shy of a round ten — round it up, do the easy multiply, then subtract what you added.</p>
      <div class="ex mono">59 × 21<br>→ 60 × 21 = 1260<br>→ subtract 1 × 21 = 21<br>= <b>1239</b></div>
      <p>60 × 21 is just 6 × 21 with a zero tacked on, so the hard part vanishes — you only pay one small subtraction.</p>`,
    gen(){ const ten=rnd(2,10), off=rnd(1,2), N=ten*10-off, M=rnd(11,99), R=ten*10;
      return { q:`${N} × ${M}`, a:N*M, steps:[
        `Round ${N} up to ${R}`,
        `${R} × ${M} = <span class="mono">${R*M}</span>`,
        `Subtract ${off} × ${M} = <span class="mono">${off*M}</span>`,
        `${R*M} − ${off*M} = <b>${N*M}</b>` ]}; } },

  { id:"close", cat:"2-digit multiplication", name:"Close-together method", tag:"When both numbers are in the same decade",
    lesson:`<h3>Close-together</h3>
      <p>When two numbers share a decade (near a base <b>z</b>): <b>(z+a)(z+b) = z·(z+a+b) + ab</b>.</p>
      <div class="ex mono">23 × 26 → base 20<br>20 × (20+3+6) + 3×6<br>= 20 × 29 + 18 = 580 + 18 = <b>598</b></div>
      <p>Shortcut: <b>20 × 29</b> is "base × (one number + the other's offset)" — and 23+6 = 26+3 = 29, a handy cross-check.</p>`,
    gen(){ const z=rnd(1,9)*10, oa=rnd(1,9), ob=rnd(1,9), x=z+oa, y=z+ob;
      return { q:`${x} × ${y}`, a:x*y, steps:[
        `Base ${z}: ${x} = ${z}+${oa}, ${y} = ${z}+${ob}`,
        `${z} × (${z}+${oa}+${ob}) = ${z} × ${z+oa+ob} = <span class="mono">${z*(z+oa+ob)}</span>`,
        `+ ${oa}×${ob} = + <span class="mono">${oa*ob}</span>`,
        `= <b>${x*y}</b>` ]}; } },

  { id:"factor", cat:"2-digit multiplication", name:"Factoring method", tag:"Break one number into small factors",
    lesson:`<h3>Factoring</h3>
      <p>If one number splits into small factors, multiply in easy steps instead of all at once.</p>
      <div class="ex mono">27 × 56 → 56 = 7 × 8<br>27 × 7 = 189<br>189 × 8 = <b>1512</b></div>
      <p>Each step is a single-digit multiply, so you never have to hold a big partial product in your head.</p>`,
    gen(){ let p,q; do{ p=rnd(2,9); q=rnd(2,9); }while(p*q<10); const F=p*q, M=rnd(12,99);
      return { q:`${M} × ${F}`, a:M*F, steps:[
        `${F} = ${p} × ${q}`,
        `${M} × ${p} = <span class="mono">${M*p}</span>`,
        `× ${q} = <b>${M*p*q}</b>` ]}; } },

  { id:"cubes", cat:"Roots", name:"Cubes 1–9", tag:"Know your cubes (the cube-root toolkit)", answerType:"num",
    lesson:`<h3>Cube the single digits</h3>
      <p>Cube roots lean on instantly knowing the cubes of 1–9 — so drill them cold. Given a digit, you give its cube (6 → 216).</p>
      <table class="map mono">
        <tr><td>n</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
        <tr><td>n³</td><td>1</td><td>8</td><td>27</td><td>64</td><td>125</td><td>216</td><td>343</td><td>512</td><td>729</td></tr>
      </table>
      <p>Pattern: the last digits run <span class="mono">1, 8, 7, 4, 5, 6, 3, 2, 9</span> — every one different — which is exactly what makes the cube-root last-digit trick work.</p>`,
    gen(){ const n=rnd(1,9); return { q:`${n}³ = ?`, a:n*n*n, steps:[
      `${n} × ${n} = ${n*n}`, `${n*n} × ${n} = <b>${n**3}</b>` ]}; } },

  { id:"cube", cat:"Roots", name:"Cube root of a perfect cube", tag:"Two digits, two glances",
    lesson:`<h3>Cube root in your head</h3>
      <p>The answer is always two digits, and you find each one separately — units first, then tens.</p>

      <h3>① Units: the last-digit map</h3>
      <p>Cube each digit and watch only the last digit of the result:</p>
      <table class="map mono">
        <tr><td>n</td><td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
        <tr><td>n³ ends</td><td>0</td><td>1</td><td>8</td><td>7</td><td>4</td><td>5</td><td>6</td><td>3</td><td>2</td><td>9</td></tr>
      </table>
      <p>Now read it the other way — cube-ending → root — and a clean pattern falls out:</p>
      <p><b>Six digits are honest:</b> the cube ends in the same digit as the root — <span class="mono">0, 1, 4, 5, 6, 9</span> map to themselves.</p>
      <p><b>The other four swap, in two pairs that each add to 10:</b></p>
      <ul>
        <li><b>2 ↔ 8</b> — straight from <span class="mono">2³ = 8</span>: a 2 makes a cube ending in 8, so a cube ending in 8 came from a 2 (and 8³ = 51<b>2</b> sends it back).</li>
        <li><b>3 ↔ 7</b> — from <span class="mono">3³ = 2<b>7</b></span>: a 3 makes a cube ending in 7; and 7³ = 34<b>3</b> sends 7 back to 3.</li>
      </ul>
      <p>So the whole units rule is just: <b>0 1 4 5 6 9 stay put; 2↔8 and 3↔7 flip.</b></p>
      <p class="why">Why only those four flip? Their last digits run in a 4-step cycle (2→4→8→6→…, 3→9→7→1→…). A cube is the 3rd step, which lands on the partner — the swap. The honest six cycle in length 1 or 2, so an odd power leaves them untouched.</p>

      <h3>② Tens: cover three digits</h3>
      <p>Since (10a+b)³ = 1000·a³ + (small stuff), everything below the thousands is just noise from b. <b>Cover the last three digits</b> and find the largest cube ≤ what's left — its root is the tens digit.</p>
      <p>Cubes to know: <span class="mono">1, 8, 27, 64, 125, 216, 343, 512, 729</span>.</p>

      <div class="ex mono">∛250047<br>① ends in 7 → 7 flips to 3 → units 3<br>② cover 047 → 250 → biggest cube ≤ 250 is 6³ = 216 → tens 6<br>= <b>63</b> &nbsp;(63³ = 250047)</div>`,
    gen(){ const r=rnd(11,99), N=r**3, a=(r/10|0), b=r%10, lo=(N/1000|0);
      return { q:`∛ ${commas(N)}`, a:r, steps:[
        `Last digit ${N%10} → units digit <span class="mono">${b}</span> (from the map)`,
        `Cover the last 3 digits → <span class="mono">${lo}</span>`,
        `Biggest cube ≤ ${lo} is ${a}³=${CUBES[a]} → tens digit <span class="mono">${a}</span>`,
        `Answer = <b>${r}</b>` ]}; } },

  { id:"fifth", cat:"Roots", name:"Fifth root of a perfect 5th power", tag:"Even easier — the last digit is free",
    lesson:`<h3>Fifth root in your head — even easier</h3>

      <h3>① Units: it's free</h3>
      <p>The magic of fifth powers: <b>n⁵ always ends in the same digit as n.</b> No map, no swaps — all ten digits are honest.</p>
      <table class="map mono">
        <tr><td>n</td><td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
        <tr><td>n⁵ ends</td><td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
      </table>
      <p>So just read the last digit of the number — that's the units digit of the root, instantly.</p>
      <p class="why">Why? Last digits of powers repeat in cycles of length 1, 2, or 4. Since 5 ≡ 1 (mod 4), the 5th power lands right back where the 1st did — on the original digit. (A cube is 3 ≡ 3, which is exactly why cubing scrambled four of them.)</p>

      <h3>② Tens: cover five digits</h3>
      <p>Because (10a+b)⁵ = 100000·a⁵ + (smaller), the b part only disturbs the last five digits. <b>Cover them</b>; the largest fifth power ≤ what remains gives the tens digit.</p>
      <p>Fifth powers to know: <span class="mono">1, 32, 243, 1024, 3125, 7776, 16807, 32768, 59049</span>.</p>

      <div class="ex mono">⁵√4084101<br>① ends in 1 → units 1<br>② cover 84101 → 40 → biggest 5th power ≤ 40 is 2⁵ = 32 → tens 2<br>= <b>21</b> &nbsp;(21⁵ = 4084101)</div>`,
    gen(){ const r=rnd(11,99), N=r**5, a=(r/10|0), b=r%10, lo=Math.floor(N/100000);
      return { q:`⁵√ ${commas(N)}`, a:r, steps:[
        `Last digit ${N%10} → units digit <span class="mono">${b}</span> (same as the root)`,
        `Cover the last 5 digits → <span class="mono">${lo}</span>`,
        `Biggest 5th power ≤ ${lo} is ${a}⁵=${FIFTHS[a]} → tens digit <span class="mono">${a}</span>`,
        `Answer = <b>${r}</b>` ]}; } },

  { id:"div7q", cat:"Division", name:"Divide by 7 — whole number", tag:"Quotient & remainder",
    lesson:`<h3>The whole-number part</h3>
      <p>To divide N by 7, find the biggest multiple of 7 that fits — that count is the quotient, and what's left over (0–6) is the remainder.</p>
      <div class="ex mono">47 ÷ 7 → 7×6 = 42, leftover 5<br>= <b>6</b> remainder 5</div>
      <p>Hold on to that remainder — it's the whole key to the decimal (next trick): the leftover r decides the repeating digits.</p>`,
    gen(){ const N=rnd(15,199), q=(N/7|0), r=N%7;
      return { q:`${N} ÷ 7 = ?`, a:q, steps:[
        `Biggest multiple of 7 ≤ ${N}: 7 × ${q} = <span class="mono">${7*q}</span>`,
        `${N} − ${7*q} = remainder <span class="mono">${r}</span>`,
        `Whole number = <b>${q}</b>${r?` (remainder ${r})`:` (exact)`}` ]}; } },

  { id:"div7d", cat:"Division", name:"Divide by 7 — the decimal", tag:"The 142857 cycle",
    lesson:`<h3>The decimal — the 142857 cycle</h3>
      <p>1/7 = 0.<b>142857</b> repeating. The magic: for any remainder r, the repeating block of r/7 is just <b>142857 × r</b> — and those six are all rotations of the same digits.</p>
      <table class="map mono">
        <tr><td>r</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td></tr>
        <tr><td>0.…</td><td>142857</td><td>285714</td><td>428571</td><td>571428</td><td>714285</td><td>857142</td></tr>
      </table>
      <p>In practice don't multiply — learn the cycle <b>1→4→2→8→5→7</b>, start on the right digit for your remainder, and read six digits around.</p>
      <h3>Which digit to start on</h3>
      <p>Easy pattern: count 1,2,3,4,5,6,7,8,9 but <b>skip every multiple of 3</b> — <b>1, 2</b> (skip 3) <b>4, 5</b> (skip 6) <b>7, 8</b> (skip 9):</p>
      <table class="map mono">
        <tr><td>r</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td></tr>
        <tr><td>start on</td><td>1</td><td>2</td><td>4</td><td>5</td><td>7</td><td>8</td></tr>
      </table>
      <div class="ex mono">30 ÷ 7 → remainder 2 → block 285714<br>= 4.<b>285714</b>…</div>
      <p class="why">142857 is a "cyclic number": multiplying it by 1–6 just rotates its digits, which is exactly why every r/7 reuses the same six in a new starting spot.</p>`,
    gen(){ let N; do{ N=rnd(8,99); }while(N%7===0); const q=(N/7|0), r=N%7, block=142857*r;
      return { q:`${N} ÷ 7 = ${q}.??????`, a:block, steps:[
        `Remainder = ${N} − 7×${q} = <span class="mono">${r}</span>`,
        `Block = 142857 × ${r} = <span class="mono">${block}</span>`,
        `So ${N} ÷ 7 = <b>${q}.${block}</b>…` ]}; } },

  { id:"calDates", cat:"Calendar", name:"Doomsday dates of the months", tag:"Memorize the monthly anchors", answerType:"num",
    lesson:`<h3>What is a "doomsday"?</h3>
<p>In every year, a set of easy-to-remember dates all land on the <b>same weekday</b> — that shared weekday is the year's <b>doomsday</b>. Know one anchor date per month and you can count a short distance to any date. This module just memorizes those anchor dates.</p>
<h3>The 12 anchor dates (common year)</h3>
<table class="map mono">
<tr><td>Jan <b>3</b></td><td>Feb <b>28</b></td><td>Mar <b>14</b></td><td>Apr <b>4</b></td></tr>
<tr><td>May <b>9</b></td><td>Jun <b>6</b></td><td>Jul <b>11</b></td><td>Aug <b>8</b></td></tr>
<tr><td>Sep <b>5</b></td><td>Oct <b>10</b></td><td>Nov <b>7</b></td><td>Dec <b>12</b></td></tr>
</table>
<h3>Mnemonics</h3>
<p><b>Even months 4,6,8,10,12 are "doubles":</b> 4/4, 6/6, 8/8, 10/10, 12/12.</p>
<p><b>Odd months — "9-to-5 at 7-11":</b> May 9 &amp; Sep 5 (5/9, 9/5), Jul 11 &amp; Nov 7 (7/11, 11/7). Each pair is the same two numbers swapped.</p>
<p><b>March</b> = Pi Day 3/14. <b>Jan/Feb</b> = 3 and 28 in a common year (the last day of Feb is the anchor).</p>
<h3>The leap-year twist</h3>
<p>A leap year changes <b>only Jan and Feb</b>: Jan → <b>4</b>, Feb → <b>29</b>. March–December are unchanged.</p>
<p class="why">Why? Feb 29 pushes the early-year anchors forward one day; later months already sit past it. (This drill always asks the common-year value.)</p>
<h3>Weekday-number map (background for later stages)</h3>
<table class="map mono">
<tr><td>Sun</td><td>Mon</td><td>Tue</td><td>Wed</td><td>Thu</td><td>Fri</td><td>Sat</td></tr>
<tr><td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td></tr>
</table>
<h3>Common mistakes</h3>
<ul><li>Forgetting the leap-year Jan/Feb shift (Jan 3→4, Feb 28→29).</li>
<li>Swapping a pair the wrong way (May is 5/9 = day 9; Sep is 9/5 = day 5).</li></ul>`,
    gen(){
      const DD=[,3,28,14,4,9,6,11,8,5,10,7,12];
      const MON=["","January","February","March","April","May","June","July","August","September","October","November","December"];
      const m=rnd(1,12); let why;
      if(m===1) why=`January's common-year anchor is the 3rd (it shifts to the 4th in a leap year).`;
      else if(m===2) why=`February's anchor is its last day: 28 (29 in a leap year).`;
      else if(m===3) why=`March is Pi Day: 3/14 (like π = 3.14).`;
      else if(m%2===0) why=`${MON[m]} is even, so its anchor is the "double" ${m}/${m} → day ${DD[m]}.`;
      else if(m===5) why=`May is the "9-to-5" pair: 5/9 → day 9 (partner Sep is 9/5).`;
      else if(m===9) why=`September is the "9-to-5" pair: 9/5 → day 5 (partner May is 5/9).`;
      else if(m===7) why=`July is the "7-11" pair: 7/11 → day 11 (partner Nov is 11/7).`;
      else why=`November is the "7-11" pair: 11/7 → day 7 (partner Jul is 7/11).`;
      return { q:`Doomsday date in ${MON[m]} — which day of the month?`, a:DD[m], steps:[ why, `Answer: ${DD[m]}` ] };
    } },

  { id:"calYear", cat:"Calendar", name:"The year's doomsday", tag:"From the two-digit year", answerType:"weekday",
    lesson:`<h3>What is the year's doomsday?</h3>
<p>Every year has a <b>doomsday</b> weekday on which the monthly anchors (4/4, 6/6, …) all fall. You get it from the <b>century anchor</b> plus a <b>year offset</b>, mod 7. This module fixes the century to the <b>2000s</b>, whose anchor is <b>Tuesday</b> (<span class="mono">2</span>), so you only work out the year part. (Weekdays: Sun=0 … Sat=6.)</p>
<h3>The divide-by-12 method</h3>
<p>From the two-digit year <span class="mono">y</span>:</p>
<ul><li><b>a</b> = <span class="mono">⌊y/12⌋</span> (whole 12s)</li>
<li><b>b</b> = <span class="mono">y mod 12</span> (remainder)</li>
<li><b>c</b> = <span class="mono">⌊b/4⌋</span> (fours in the remainder)</li></ul>
<p>offset = <span class="mono">(a + b + c) mod 7</span>, and year's doomsday = <span class="mono">(2 + offset) mod 7</span>.</p>
<h3>Worked: 2027</h3>
<div class="ex mono">y=27 → a=2, b=3, c=0 → offset 5<br>(2 + 5) mod 7 = 0 = Sunday</div>
<h3>Worked: 2066</h3>
<div class="ex mono">y=66 → a=5, b=6, c=1 ← don't skip c!<br>offset = 12 mod 7 = 5 → (2+5) mod 7 = 0 = Sunday</div>
<p class="why">Why it works: each year shifts the doomsday +1 (a common year is 52 weeks + 1 day), and each leap year shifts +2. The a, b, c terms just count those steps and the extra leap days.</p>
<h3>The "odd + 11" shortcut</h3>
<p>T=y; if T odd add 11; halve; if T odd add 11; then T = 7 − (T mod 7). Year's doomsday = (anchor + T) mod 7. Same answer — pick your favorite.</p>
<p><b>Common mistake:</b> dropping the fours term <span class="mono">c</span> when the remainder b ≥ 4 — that's off by exactly one day.</p>`,
    gen(){
      const yr = 2000 + rnd(0,99);
      const a = dow(yr, 4, 4);
      const y = yr % 100, A = Math.floor(y/12), b = y%12, c = Math.floor(b/4), off = (A+b+c)%7;
      return { q:`Doomsday weekday of ${yr}?`, a, steps:[
        `Two-digit year ${y}: 12s a = ${A}, remainder b = ${b}, fours c = ${c}`,
        `offset = (${A} + ${b} + ${c}) mod 7 = ${off}`,
        `2000s anchor Tuesday(2): (2 + ${off}) mod 7 = ${a} → <b>${WD[a]}</b>` ]};
    } },

  { id:"calCentury", cat:"Calendar", name:"Century anchor days", tag:"The backbone weekday per century", answerType:"weekday",
    lesson:`<h3>Century anchor days</h3>
<p>The Doomsday method starts from one fixed weekday per century — the <b>century anchor</b>, the doomsday of the year ending in <span class="mono">00</span>.</p>
<h3>The four core anchors</h3>
<table class="map mono">
<tr><td>1700s</td><td>Sunday (0)</td></tr><tr><td>1800s</td><td>Friday (5)</td></tr>
<tr><td>1900s</td><td>Wednesday (3)</td></tr><tr><td>2000s</td><td>Tuesday (2)</td></tr></table>
<p><b>Hook:</b> 1700→2000 = Sun, Fri, Wed, Tue (each step back 2 days, then 1).</p>
<h3>The 400-year cycle</h3>
<p>The calendar repeats every 400 years, so anchors cycle with period 4 centuries: 2100s=Sun, 2200s=Fri, 2300s=Wed, 2400s=Tue, …</p>
<h3>The c-mod-4 rule</h3>
<p>Let <span class="mono">c = ⌊year/100⌋</span>. Then:</p>
<table class="map mono"><tr><td>c mod 4</td><td>0</td><td>1</td><td>2</td><td>3</td></tr>
<tr><td>anchor</td><td>Tue</td><td>Sun</td><td>Fri</td><td>Wed</td></tr></table>
<div class="ex mono">1900s → c=19, 19 mod 4 = 3 → Wednesday<br>2200s → c=22, 22 mod 4 = 2 → Friday</div>
<p class="why">Only c mod 4 matters because the 400-year cycle lands the four residues on Tue, Sun, Fri, Wed.</p>
<p><b>Common mistake:</b> a year ending in 00 is in its <i>own</i> century — 2000 is in the 2000s (Tuesday), not the 1900s.</p>`,
    gen(){
      const c = rnd(15, 24), yr = c*100, a = dow(yr, 4, 4), cm = c % 4;
      return { q:`Anchor day for the ${yr}s?`, a, steps:[
        `Century number c = ${c}, c mod 4 = ${cm}`,
        `${cm} → ${WD[a]} (0→Tue, 1→Sun, 2→Fri, 3→Wed)`,
        `Anchor of the ${yr}s = <b>${WD[a]}</b>` ]};
    } },

  { id:"calFull", cat:"Calendar", name:"Any date → day of the week", tag:"Put it all together", answerType:"weekday",
    lesson:`<h3>The capstone: any date in your head</h3>
<p>The whole Doomsday method, assembled. Three ingredients: <b>century anchor</b>, <b>year's doomsday</b>, and a <b>month anchor date</b>. (Sun=0 … Sat=6.)</p>
<h3>The 3 steps</h3>
<p><b>1 — Century anchor.</b> c = ⌊year/100⌋, c mod 4 → Tue/Sun/Fri/Wed (1700s Sun, 1800s Fri, 1900s Wed, 2000s Tue).</p>
<p><b>2 — Year offset.</b> a=⌊y/12⌋, b=y mod 12, cc=⌊b/4⌋, offset=(a+b+cc) mod 7. Year's doomsday = (anchor + offset) mod 7.</p>
<p><b>3 — Month anchor.</b> Step from the month's anchor date: Jan 3*, Feb 28*, Mar 14, Apr 4, May 9, Jun 6, Jul 11, Aug 8, Sep 5, Oct 10, Nov 7, Dec 12. Weekday = (year's doomsday + (day − anchor date)) mod 7. (*leap years: Jan 4, Feb 29.)</p>
<h3>Worked: July 4, 1776</h3>
<div class="ex mono">1700s anchor = Sun (0)<br>Year 76: a=6, b=4, cc=1 → offset 11 mod 7 = 4 → doomsday Thu (4)<br>July anchor 11; 4 − 11 = −7 ≡ 0<br>= <b>Thursday</b></div>
<h3>Worked: Dec 25, 2027</h3>
<div class="ex mono">2000s anchor = Tue (2)<br>Year 27: offset 5 → doomsday Sun (0)<br>Dec anchor 12; 25 − 12 = 13 ≡ 6<br>= <b>Saturday</b></div>
<h3>Leap-year edge cases</h3>
<ul><li>Leap if divisible by 4, except centuries not divisible by 400 → <b>2000 is leap; 1700/1800/1900/2100 are not</b>.</li>
<li>Only Jan/Feb anchors shift (Jan 4, Feb 29).</li></ul>
<h3>Expert shortcuts</h3>
<ul><li>Any date ±7 from an anchor shares its weekday (4/4, 4/11, 4/18, 4/25…).</li>
<li>Reduce mod 7 early; wrap negative differences by adding 7.</li></ul>`,
    gen(){
      function isLeap(y){ return (y%4===0 && y%100!==0) || y%400===0; }
      function dim(y,m){ return [31, isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m-1]; }
      const MON=["","January","February","March","April","May","June","July","August","September","October","November","December"];
      const y = rnd(1700,2099), m = rnd(1,12), d = rnd(1, dim(y,m));
      const a = dow(y,m,d), anchor = dow(Math.floor(y/100)*100, 4, 4), yearDoom = dow(y, 4, 4);
      const DD=[,3, isLeap(y)?29:28,14,4,9,6,11,8,5,10,7,12];
      return { q:`What day of the week was ${d} ${MON[m]} ${y}?`, a, steps:[
        `Century anchor (${Math.floor(y/100)}00s): ${WD[anchor]}`,
        `${y}'s doomsday weekday: ${WD[yearDoom]}`,
        `${MON[m]} anchor is the ${DD[m]}${m<=2?" (leap-adjusted)":""}; ${d} − ${DD[m]} = ${d-DD[m]} (mod 7)`,
        `Answer: <b>${WD[a]}</b>` ]};
    } },
];

/* ---- app ---- */
const app = {
  cur:null, prob:null, input:"", answered:false, factor:11,
  total:0, correct:0, streak:0, best:0,

  init(){
    const list=$("trickList"); let lastCat="";
    const catOrder=["Roots","Division","Calendar","2-digit multiplication"];
    const ordered=[...TRICKS].sort((a,b)=>catOrder.indexOf(a.cat)-catOrder.indexOf(b.cat));
    ordered.forEach(t=>{
      if(t.cat!==lastCat){ const h=document.createElement("div"); h.className="cat"; h.textContent=t.cat; list.appendChild(h); lastCat=t.cat; }
      const b=document.createElement("button"); b.className="tile";
      b.innerHTML=`<b>${t.name}</b><span>${t.tag}</span>`;
      b.onclick=()=>this.lesson(t.id);
      list.appendChild(b);
    });
  },
  home(){ show("home"); },
  lesson(id){ this.cur=TRICKS.find(t=>t.id===id);
    $("lessonTitle").textContent=this.cur.name;
    if(this.cur.picker){ $("lessonBody").innerHTML=this.pickerHTML(); $("lessonGo").classList.add("hidden"); }
    else { $("lessonBody").innerHTML=this.cur.lesson; $("lessonGo").classList.remove("hidden"); }
    show("lesson"); },
  practice(){ this.total=0; this.correct=0; this.streak=0; this.best=0;
    $("practiceTitle").textContent=this.cur.name; show("practice"); this.next(); },

  pickerHTML(){
    let h='<p>Pick a number — you’ll drill its whole table, all the way up to that number squared.</p><div class="pick">';
    for(let n=11;n<=20;n++) h+=`<button class="picknum" onclick="app.startTable(${n})">${n}</button>`;
    h+='</div><p class="why">e.g. pick 13 → you’ll get 13×2 through 13×13, with the “10×k + 3×k” split shown each time.</p>';
    return h;
  },
  startTable(factor){
    this.factor=factor; this.total=0; this.correct=0; this.streak=0; this.best=0;
    $("practiceTitle").textContent=this.cur.name+" — "+factor;
    show("practice"); this.next();
  },
  tableProblem(N){
    const k=rnd(2,N), a=(N/10|0)*10, b=N%10;
    const steps=[`${N} × ${k} = <b>${N*k}</b>`];
    if(b>0 && a>0) steps.push(`split: ${a}×${k} + ${b}×${k} = ${a*k} + ${b*k} = <b>${N*k}</b>`);
    return { q:`${N} × ${k}`, a:N*k, steps };
  },

  next(){
    this.prob = this.cur.picker ? this.tableProblem(this.factor) : this.cur.gen();
    this.input=""; this.answered=false;
    $("qtext").textContent=this.prob.q;
    $("fb").textContent=""; $("fb").className="fb";
    $("steps").className="steps"; $("steps").innerHTML="";
    $("nextBtn").classList.add("hidden");
    this.renderPad();
    this.renderAns();
  },
  renderAns(){ const a=$("ans"); if(this.input===""){ a.textContent="—"; a.classList.add("empty"); }
    else { a.textContent=this.input; a.classList.remove("empty"); } },

  press(d){ if(this.answered) return; if(this.input.length<7) this.input+=d; this.renderAns(); },
  del(){ if(this.answered) return; this.input=this.input.slice(0,-1); this.renderAns(); },
  check(){ if(this.answered || this.input==="") return; this.grade(Number(this.input)); },
  submitWeekday(i){ this.grade(i); },
  grade(value){
    if(this.answered) return;
    this.answered=true; this.total++;
    const weekday = this.cur.answerType==="weekday", ok = value===this.prob.a, fb=$("fb");
    if(ok){ this.correct++; this.streak++; this.best=Math.max(this.best,this.streak);
      fb.textContent = weekday ? "✓ "+WD[this.prob.a] : "✓ correct"; fb.className="fb ok"; }
    else { this.streak=0;
      fb.textContent = weekday ? "✗ it's "+WD[this.prob.a]+" — you tapped "+WD[value] : "✗ it's "+commas(this.prob.a);
      fb.className="fb bad"; }
    if(weekday){ const keys=$("keypad").querySelectorAll(".day");
      if(keys[this.prob.a]) keys[this.prob.a].classList.add("right");
      if(!ok && keys[value]) keys[value].classList.add("wrongkey"); }
    // only reveal the steps when you MISS — a correct answer keeps the layout still
    if(!ok){ const st=$("steps"); st.innerHTML="<ol><li>"+this.prob.steps.join("</li><li>")+"</li></ol>"; st.classList.add("show"); }
    $("scCorrect").textContent=this.correct; $("scTotal").textContent=this.total;
    $("scStreak").textContent=this.streak; $("scBest").textContent=this.best;
    // advance affordance: numeric → the Check key becomes Next (no new button); weekday → small Next button
    if(this.chkKey){ this.chkKey.textContent="Next →"; this.chkKey.onclick=()=>this.next(); }
    else { $("nextBtn").classList.remove("hidden"); }
  },
  renderPad(){
    const pad=$("keypad"); pad.innerHTML=""; this.chkKey=null;
    const weekday = this.cur && this.cur.answerType==="weekday";
    $("ans").style.display = weekday ? "none" : "";
    if(weekday){
      const grid=document.createElement("div"); grid.className="daypad";
      WD.forEach((name,i)=>{ const k=document.createElement("div"); k.className="key day"; k.textContent=name; k.onclick=()=>this.submitWeekday(i); grid.appendChild(k); });
      pad.appendChild(grid);
    } else {
      const grid=document.createElement("div"); grid.className="pad";
      for(let n=1;n<=9;n++){ const k=document.createElement("div"); k.className="key"; k.textContent=n; k.onclick=()=>this.press(""+n); grid.appendChild(k); }
      const del=document.createElement("div"); del.className="key wide"; del.textContent="⌫"; del.onclick=()=>this.del();
      const zero=document.createElement("div"); zero.className="key"; zero.textContent="0"; zero.onclick=()=>this.press("0");
      const chk=document.createElement("div"); chk.className="key check wide"; chk.textContent="Check"; chk.onclick=()=>this.check();
      grid.appendChild(del); grid.appendChild(zero); grid.appendChild(chk);
      pad.appendChild(grid); this.chkKey=chk;       // remember it so it can morph into "Next"
    }
  }
};
app.init();
// physical keyboard support (desktop)
document.addEventListener("keydown", e=>{
  if($("practice").classList.contains("hidden")) return;
  if(app.cur && app.cur.answerType==="weekday"){
    if(!app.answered && e.key>="0" && e.key<="6") app.submitWeekday(Number(e.key));
    else if(e.key==="Enter" && app.answered) app.next();
    return;
  }
  if(app.answered){ if(e.key==="Enter") app.next(); return; }
  if(e.key>="0"&&e.key<="9") app.press(e.key);
  else if(e.key==="Backspace"){ e.preventDefault(); app.del(); }
  else if(e.key==="Enter") app.check();
});
</script>
</body>
</html>
