<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Qubic — 4×4×4 Tic-Tac-Toe</title>
<link rel="stylesheet" href="/style.css">
<style>
  :root{ --panel:var(--bg-card); --ink:var(--fg); --muted:var(--fg-dim); --line:var(--rule);
    --red:#ff5d6c; --blue:#5db6ff; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:var(--sans);
    -webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  .wrap{max-width:520px;margin:0 auto;padding:16px 14px 32px}
  h1{font-size:23px;margin:.1em 0 .1em}
  .sub{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:12px}
  button{appearance:none;border:0;border-radius:12px;padding:11px 14px;font-size:15px;font-weight:600;
    background:var(--accent);color:#06243a;cursor:pointer}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#12151b}
  .seg button{background:transparent;color:var(--muted);border-radius:0;font-weight:600;padding:9px 12px;font-size:14px}
  .seg button.on{background:#223047;color:#dbe8ff}
  .hud{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;min-height:30px}
  .turn{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600}
  .dot{width:16px;height:16px;border-radius:50%}
  .dot.red{background:radial-gradient(circle at 35% 30%,#ffd0d4,var(--red) 60%,#b81f2e)}
  .dot.blue{background:radial-gradient(circle at 35% 30%,#d4ecff,var(--blue) 60%,#1f6fb8)}
  .muted{color:var(--muted);font-size:13px}
  .hidden{display:none!important}

  /* 2-D board */
  svg#svg{display:block;width:100%;height:auto;touch-action:manipulation;user-select:none}
  .gridline{stroke:#cdd6e4;stroke-opacity:.30;stroke-width:1}
  .layerfill{fill:#aecbff;fill-opacity:.030}
  .seat{fill:#000;fill-opacity:.32}
  .spot{fill:#cdd6e4;fill-opacity:.16}
  .ball{cursor:default}
  .hit{fill:transparent;cursor:pointer}
  .layerlabel{fill:var(--muted);font-size:13px;font-weight:600}
  .winline{stroke-linecap:round;stroke:#ffe27a;stroke-opacity:.9;stroke-width:7;filter:url(#glow)}

  /* 3-D board */
  #stage{width:100%;aspect-ratio:1/1;max-height:74vh;border-radius:12px;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 30%,#161a22,#0c0e12);touch-action:none;position:relative}
  #stage canvas{display:block}
  #hint{position:absolute;left:0;right:0;bottom:8px;text-align:center;color:var(--muted);font-size:12px;
    pointer-events:none;text-shadow:0 1px 3px #000}
  footer{color:#5a6473;font-size:12px;text-align:center;margin-top:10px}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Qubic</h1>
  <p class="sub">3-D tic-tac-toe on a 4×4×4 cube. Get four in a row — across a layer, up the stack, or along any
    diagonal (including the long corner-to-corner ones). Switch between a flat 3/4 view and a fully rotatable cube.</p>

  <div class="card">
    <div class="row">
      <div class="seg" id="viewSeg">
        <button data-view="2d">Flat 2-D</button>
        <button data-view="3d" class="on">3-D cube</button>
      </div>
      <div class="seg" id="modeSeg">
        <button data-mode="cpu" class="on">vs Computer</button>
        <button data-mode="pvp">2 players</button>
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="seg" id="diffSeg">
        <button data-diff="easy">Easy</button>
        <button data-diff="hard" class="on">Hard</button>
        <button data-diff="insane">Insane</button>
      </div>
      <span class="muted" id="firstWrap" style="display:flex;align-items:center;gap:8px">First
        <span class="seg" id="firstSeg">
          <button data-first="R">Red</button>
          <button data-first="B">Blue</button>
          <button data-first="alt" class="on">Alt</button>
        </span>
      </span>
    </div>
    <div class="row" style="margin-top:10px;justify-content:flex-end">
      <button class="ghost hidden" id="resetView">Recenter</button>
      <button class="ghost" id="newBtn">New game</button>
    </div>
  </div>

  <div class="card" style="padding:10px">
    <div class="hud">
      <div class="turn"><span class="dot red" id="turnDot"></span><span id="turnTxt">Your move</span></div>
      <span class="muted" id="moveCount">0 / 64</span>
    </div>
    <svg id="svg" viewBox="0 -16 430 612" aria-label="Qubic board"></svg>
    <div id="stage" class="hidden"><div id="hint"></div></div>
  </div>

  <footer>One of <a href="../">the games</a>. 3-D view built with three.js.</footer>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
/* ===================== shared game logic ===================== */
const N=4, CELLS=64, HUMAN='R', CPU='B';
const idx=(i,j,z)=>z*16+j*4+i;
const cellIJZ=c=>[c%4, Math.floor(c/4)%4, Math.floor(c/16)];
const LINES=(()=>{
  const dirs=[]; for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++)for(let dz=-1;dz<=1;dz++) if(dx||dy||dz) dirs.push([dx,dy,dz]);
  const seen=new Set(), out=[];
  for(let i=0;i<N;i++)for(let j=0;j<N;j++)for(let z=0;z<N;z++) for(const [dx,dy,dz] of dirs){
    const px=i-dx,py=j-dy,pz=z-dz; if(px>=0&&px<N&&py>=0&&py<N&&pz>=0&&pz<N) continue;
    const ex=i+3*dx,ey=j+3*dy,ez=z+3*dz; if(ex<0||ex>=N||ey<0||ey>=N||ez<0||ez>=N) continue;
    const cells=[]; for(let s=0;s<N;s++) cells.push(idx(i+s*dx,j+s*dy,z+s*dz));
    const key=[...cells].sort((a,b)=>a-b).join(','); if(seen.has(key)) continue; seen.add(key); out.push(cells);
  } return out;
})();
const LINES_BY_CELL=Array.from({length:CELLS},()=>[]);
LINES.forEach((ln,li)=>ln.forEach(c=>LINES_BY_CELL[c].push(li)));
const CELLW=LINES_BY_CELL.map(a=>a.length);

let board, turn, winner, winLine, lastMove, busy;
let mode='cpu', diff='hard', firstPref='alt', altNext='R', view='3d';

function wonLine(b,p){ for(const ln of LINES) if(b[ln[0]]===p&&b[ln[1]]===p&&b[ln[2]]===p&&b[ln[3]]===p) return ln; return null; }
function lineScore(c,p){ const opp=p==='R'?'B':'R'; let s=0;
  for(const li of LINES_BY_CELL[c]){ let mine=0,bad=false;
    for(const cc of LINES[li]){ if(board[cc]===opp){bad=true;break;} if(board[cc]===p) mine++; }
    if(!bad) s+=[1,3,9,40][mine]||40; } return s; }
function threatsAfter(c,p){ const opp=p==='R'?'B':'R'; board[c]=p; let t=0;
  for(const li of LINES_BY_CELL[c]){ let mine=0,bad=false;
    for(const cc of LINES[li]){ if(board[cc]===opp){bad=true;break;} if(board[cc]===p) mine++; }
    if(!bad&&mine===3) t++; } board[c]=null; return t; }
function pickWeighted(arr,fn){ let best=-1e9,pick=arr[0]; for(const c of arr){ const s=fn(c); if(s>best){best=s;pick=c;} } return pick; }
function chooseMove(){
  if(diff==='insane') return chooseMoveStrong();
  const empties=[]; for(let c=0;c<CELLS;c++) if(!board[c]) empties.push(c);
  for(const c of empties){ board[c]=CPU; const w=!!wonLine(board,CPU); board[c]=null; if(w) return c; }
  for(const c of empties){ board[c]=HUMAN; const w=!!wonLine(board,HUMAN); board[c]=null; if(w) return c; }
  if(diff==='easy') return pickWeighted(empties,c=>lineScore(c,CPU)+Math.random()*6);
  const myFork=empties.find(c=>threatsAfter(c,CPU)>=2); if(myFork!=null) return myFork;
  const oppForks=empties.filter(c=>threatsAfter(c,HUMAN)>=2); if(oppForks.length===1) return oppForks[0];
  return pickWeighted(empties,c=>lineScore(c,CPU)+lineScore(c,HUMAN)*0.6+threatsAfter(c,CPU)*40+Math.random()*1.5);
}

/* ===================== Insane engine — strong Qubic defender =====================
   Rebuilt for real defensive strength (the previous version let the opponent build a
   central-2x2 double-threat fork).  Layers, cheap+certain first, then deep:
     - guaranteed win-in-1 and block-in-1 (never missed);
     - Threat-Space Search (tss): proves forced wins by open-3 threat sequences, used
       to grab our own forced wins and to refuse any move giving the opponent one;
     - a bounded AND-OR solver that also lets the attacker play QUIET setup moves,
       which is exactly how the central-block reciprocal-zugzwang fork is built, so
       the defender steers clear of it several plies early;
     - iterative-deepening negamax + alpha-beta + Zobrist TT + quiescence, with a
       threat-aware, centre-weighted, defensively-biased evaluation (breaks up the
       opponent developing forks and contests the high-connectivity inner cells);
     - root-move reduction by the position symmetry stabiliser (48-element cube group).
   Operates on an internal Int8 copy seeded from the live `board`; never mutates it. */
function createStrong(deps){
  const {CELLS, LINES, LINES_BY_CELL, CELLW} = deps;
  const NL = LINES.length;
  const WIN = 1e7;
  const W3  = [0,1,6,26];           // static weight for MY (side-1) lines
  const W3O = [0,1,11,46];          // heavier weight for OPPONENT lines (defensive bias)
  // Positional weight per cell.  Inner 2x2x2 block cells enable central-block forks,
  // so they are worth far more than equally-connected corners: contest the centre.
  const PW = (()=>{ const w=new Float64Array(CELLS);
    for(let c=0;c<CELLS;c++){ const i=c%4, j=(c>>2)&3, z=(c>>4)&3;
      const inI=(i===1||i===2), inJ=(j===1||j===2), inZ=(z===1||z===2);
      const inner=inI&&inJ&&inZ; w[c]=CELLW[c] + (inner?10:0); }
    return w; })();
  const IS_INNER = (()=>{ const a=new Uint8Array(CELLS);
    for(let c=0;c<CELLS;c++){ const i=c%4, j=(c>>2)&3, z=(c>>4)&3;
      if((i===1||i===2)&&(j===1||j===2)&&(z===1||z===2)) a[c]=1; } return a; })();

  // ---- Zobrist ----
  const ZOB = (()=>{ const z=Array.from({length:CELLS},()=>[null,[0,0],[0,0]]);
    let seed=0x2f6e2b1>>>0; const rnd=()=>{ seed^=seed<<13; seed^=seed>>>17; seed^=seed<<5; seed>>>=0; return seed>>>0; };
    for(let c=0;c<CELLS;c++){ z[c][1]=[rnd(),rnd()]; z[c][2]=[rnd(),rnd()]; } return z; })();

  // ---- 48 symmetries of the 4x4x4 grid (axis permutations x axis flips) ----
  const SYMS = (()=>{ const idx3=(i,j,z)=>z*16+j*4+i;
    const perms=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]]; const out=[];
    for(const p of perms) for(let f=0; f<8; f++){ const fl=[f&1,(f>>1)&1,(f>>2)&1];
      const map=new Int32Array(CELLS);
      for(let z=0;z<4;z++)for(let j=0;j<4;j++)for(let i=0;i<4;i++){ const co=[i,j,z];
        let a=co[p[0]], b=co[p[1]], d=co[p[2]]; if(fl[0])a=3-a; if(fl[1])b=3-b; if(fl[2])d=3-d;
        map[idx3(i,j,z)] = idx3(a,b,d); }
      out.push(map); }
    return out; })();

  // ---- search state ----
  let sB, sC1, sC2, sHa, sHb, sPly, sTT, sDeadline, sAbort, sNodes;
  let tssNodes, tssBudget;
  let solverNodes, solverBudget, solverTT;

  function make(c,side){ sB[c]=side; sHa^=ZOB[c][side][0]; sHb^=ZOB[c][side][1]; sPly++;
    const L=LINES_BY_CELL[c]; let won=false;
    if(side===1){ for(const li of L){ if(++sC1[li]===4) won=true; } }
    else { for(const li of L){ if(++sC2[li]===4) won=true; } } return won; }
  function unmake(c,side){ sB[c]=0; sHa^=ZOB[c][side][0]; sHb^=ZOB[c][side][1]; sPly--;
    const L=LINES_BY_CELL[c];
    if(side===1){ for(const li of L) sC1[li]--; } else { for(const li of L) sC2[li]--; } }
  function emptyOfLine(li){ for(const cc of LINES[li]) if(!sB[cc]) return cc; return -1; }

  // distinct empty cells that complete a line for `side` right now (immediate wins)
  function winCells(side){ const mine=side===1?sC1:sC2, opp=side===1?sC2:sC1; let out=null;
    for(let li=0; li<NL; li++){ if(mine[li]===3 && opp[li]===0){ const e=emptyOfLine(li);
      if(e<0) continue; if(!out) out=[e]; else if(!out.includes(e)) out.push(e); } }
    return out||[]; }

  // moves that create at least one new open-3 threat for `side`, with threat count
  function threatMoves(side){ const mine=side===1?sC1:sC2, opp=side===1?sC2:sC1; const out=[];
    for(let c=0;c<CELLS;c++){ if(sB[c]) continue; let n=0;
      for(const li of LINES_BY_CELL[c]) if(mine[li]===2 && opp[li]===0) n++;
      if(n>0) out.push([c,n]); }
    out.sort((a,b)=>b[1]-a[1]); return out; }

  /* Threat-space search: can `side` (to move) force a win using only threatening
     moves (each creates an open-3), the opponent being forced to block the single
     resulting threat?  Returns true if a forced win is proven, false otherwise.
     `depth` counts side's moves. Sound-ish for defense: opponent is allowed to
     win immediately if it can (refutes the line). */
  function tss(side, depth){
    if(sAbort || (++tssNodes)>tssBudget) return false;
    if((tssNodes&511)===0 && Date.now()>sDeadline){ sAbort=true; return false; }
    const other = side===1?2:1;
    if(winCells(side).length>=1) return true;         // we complete a 4 right now
    const ow = winCells(other);
    if(ow.length>=2) return false;                    // opponent already has a fork; we can't win first
    if(depth<=0) return false;
    let moves;
    if(ow.length===1) moves=[[ow[0],0]];              // we are forced to block their single threat
    else moves=threatMoves(side);
    for(const [c] of moves){
      const won = make(c,side); if(won){ unmake(c,side); return true; }
      const wc = winCells(side);
      if(wc.length>=2){                               // we created a double threat (fork)
        if(winCells(other).length===0){ unmake(c,side); return true; }
        unmake(c,side); continue;                     // opponent can win first -> refuted
      }
      if(wc.length===1){                              // single threat: opponent forced to block it
        if(winCells(other).length>=1){ unmake(c,side); continue; } // opponent wins first -> refuted
        const won2 = make(wc[0], other);
        const r = won2 ? false : tss(side, depth-1);
        unmake(wc[0], other); unmake(c,side);
        if(r) return true; continue;
      }
      unmake(c,side);                                 // forced block with no counter-threat: can't prove
    }
    return false;
  }

  // ---- quiescence over forcing replies + threat-aware, center-weighted static eval ----
  function qsearch(side, q){
    if(sPly===CELLS) return 0;
    const meMax = side===1;
    let s=0, myWin=false, t0=-1, forkOpp=false;
    for(let li=0;li<NL;li++){ const a=sC1[li], b=sC2[li];
      if(a){ if(b) continue; s+=W3[a];
        if(a===3){ if(meMax) myWin=true; else { const e=emptyOfLine(li); if(t0<0) t0=e; else if(e!==t0) forkOpp=true; } }
      } else if(b){ s-=W3O[b];
        if(b===3){ if(!meMax) myWin=true; else { const e=emptyOfLine(li); if(t0<0) t0=e; else if(e!==t0) forkOpp=true; } }
      } }
    if(myWin) return WIN - sPly - 1;
    if(forkOpp) return -(WIN - sPly - 2);
    if(t0>=0 && q<12){ const other = meMax?2:1;
      const won=make(t0,side); const v = won ? (WIN - sPly - 1) : -qsearch(other, q+1);
      unmake(t0,side); return v; }
    // Threat-space (VCT) probe: can the side to move force a win by threats?
    if(q<3 && sPly<CELLS-1){ tssNodes=0; tssBudget=12000;
      if(tss(side, 9)) return WIN - sPly - 3; }
    // positional: centre / high-connectivity occupancy (inner block weighted up)
    let pos=0; for(let c=0;c<CELLS;c++){ const v=sB[c]; if(v===1) pos+=PW[c]; else if(v===2) pos-=PW[c]; }
    s += pos*0.35;
    // fork-pressure (defensive only): count empty cells where the OPPONENT would gain an
    // open-3 (threat) or a double threat (fork), and penalise it — the defender should
    // break up developing forks before they turn tactical.  Own potential is left to the
    // line terms / positional so the defender does not abandon the centre to attack.
    let oTh=0,oFork=0;
    for(let c=0;c<CELLS;c++){ if(sB[c]) continue; let o2=0;
      for(const li of LINES_BY_CELL[c]){ if(sC1[li]===0 && sC2[li]===2) o2++; }
      if(o2>=1) oTh++; if(o2>=2) oFork++; }
    s -= oTh*5 + oFork*70;
    return meMax? s : -s;
  }

  function orderList(list, side, ttMove){ const mine=side===1?sC1:sC2, opp=side===1?sC2:sC1;
    const scoreOf=c=>{ if(c===ttMove) return 1e9; let sv=CELLW[c]*2 + (IS_INNER[c]?12:0);
      for(const li of LINES_BY_CELL[c]){ const a=mine[li], o=opp[li];
        if(a===3&&o===0) sv+=100000; if(o===3&&a===0) sv+=9000;
        if(o===0) sv+=[0,1,8,50][a]; else if(a===0) sv+=[0,1,3,20][o]*0.3; }
      return sv; };
    return list.slice().sort((x,y)=>scoreOf(y)-scoreOf(x)); }
  function ordered(side, ttMove){ const list=[]; for(let c=0;c<CELLS;c++) if(!sB[c]) list.push(c);
    return orderList(list, side, ttMove); }

  function nm(depth, alpha, beta, side){
    if((sNodes++&1023)===0 && Date.now()>sDeadline) sAbort=true;
    if(sAbort) return 0;
    if(sPly===CELLS) return 0;
    if(depth<=0) return qsearch(side, 0);
    const key=sHa+','+sHb+','+side, tt=sTT.get(key), a0=alpha;
    if(tt && tt.d>=depth){ if(tt.f===0) return tt.v;
      if(tt.f===1){ if(tt.v>alpha) alpha=tt.v; } else { if(tt.v<beta) beta=tt.v; }
      if(alpha>=beta) return tt.v; }
    const other=side===1?2:1;
    const moves=ordered(side, tt?tt.m:-1);
    let best=-Infinity, bestMove=moves[0];
    for(const c of moves){ const won=make(c,side);
      const s = won ? (WIN - sPly) : -nm(depth-1, -beta, -alpha, other);
      unmake(c,side);
      if(sAbort) return best>-Infinity?best:0;
      if(s>best){ best=s; bestMove=c; if(s>alpha) alpha=s; }
      if(alpha>=beta) break; }
    let f=0; if(best<=a0) f=2; else if(best>=beta) f=1;
    sTT.set(key,{d:depth,v:best,f,m:bestMove});
    return best;
  }

  function setup(board, me){
    sB=new Int8Array(CELLS); sC1=new Int16Array(NL); sC2=new Int16Array(NL);
    sHa=0; sHb=0; sPly=0;
    for(let c=0;c<CELLS;c++){ const v=board[c]; if(!v) continue;
      const side=v===me?1:2; sB[c]=side; sPly++;
      sHa^=ZOB[c][side][0]; sHb^=ZOB[c][side][1];
      const L=LINES_BY_CELL[c]; if(side===1){ for(const li of L) sC1[li]++; } else { for(const li of L) sC2[li]++; } }
  }

  function rootMoves(){ const emp=[]; for(let c=0;c<CELLS;c++) if(!sB[c]) emp.push(c);
    const stab=[]; for(const m of SYMS){ let ok=true; for(let c=0;c<CELLS;c++){ if(sB[m[c]]!==sB[c]){ ok=false; break; } } if(ok) stab.push(m); }
    if(stab.length<=1) return emp;
    const seen=new Uint8Array(CELLS), reps=[];
    for(const c of emp){ if(seen[c]) continue; reps.push(c); for(const m of stab) seen[m[c]]=1; }
    return reps; }

  // does opponent (to move next, internal side 2) have a forced threat-win from current sB?
  function oppHasForcedWin(depth){ tssNodes=0; tssBudget=200000; return tss(2, depth); }

  /* Bounded AND-OR solver for the DEFENDER.  Unlike tss, the attacker (opp, side 2)
     may play QUIET setup moves (not just open-3 threats), which is how the central-
     block reciprocal-zugzwang fork is built.  Returns true iff opp (to move) can
     force a win within `depth` opp tempo-moves against the defender's best reply,
     over a pruned but generous set of relevant moves.  Root-only (expensive). */
  // opp QUIET setup moves: build open-2s (toward a fork) but create no open-3 (those
  // are handled by tss). Ordered by how much they build. side 2 = opp.
  function quietOppSetups(){ const out=[];
    for(let c=0;c<CELLS;c++){ if(sB[c]) continue; let build=0, threat=false;
      for(const li of LINES_BY_CELL[c]){ if(sC1[li]===0){ if(sC2[li]===2) threat=true; else if(sC2[li]===1) build++; } }
      if(!threat && build>0) out.push([c, build*100 + PW[c]]); }
    out.sort((a,b)=>b[1]-a[1]); return out.slice(0,9).map(x=>x[0]); }
  // defender replies to opp's setup: forced block(s) first, then contest opp lines.
  function defReplies(){ const ow=winCells(2); if(ow.length>=2) return [];
    const out=[]; for(let c=0;c<CELLS;c++){ if(sB[c]) continue; let val=PW[c];
      for(const li of LINES_BY_CELL[c]){ if(sC1[li]===0 && sC2[li]>=1) val+=sC2[li]*sC2[li]*10;
        if(sC2[li]===0 && sC1[li]===2) val+=20; }
      if(ow.length===1 && c===ow[0]) val+=1e6;
      out.push([c,val]); }
    out.sort((a,b)=>b[1]-a[1]); return out.slice(0, ow.length===1?5:8).map(x=>x[0]); }

  /* opp (side 2, to move) can force a win?  tss finishes any threat sequence; the
     AND-OR recursion explores up to `depth` QUIET setup moves that build the fork
     (e.g. the central-block zugzwang), with the defender forced to reply. */
  function oppWins(depth){
    if(sAbort) return false;
    if((++solverNodes & 1023)===0 && Date.now()>sDeadline){ sAbort=true; return false; }
    if(solverNodes>solverBudget) return false;   // inconclusive -> not proven
    tssNodes=0; tssBudget=30000; if(tss(2, 11)) return true;   // threat / fork-in-1 win
    if(depth<=0) return false;
    const key=sHa+','+sHb+','+depth; const c0=solverTT.get(key); if(c0!==undefined) return c0;
    let res=false;
    for(const m of quietOppSetups()){
      make(m,2);
      let defSafe=false; const dm=defReplies();
      if(dm.length===0){ unmake(m,2); res=true; break; }      // opp forked -> defender lost
      for(const d of dm){ const w2=make(d,1);
        if(w2){ unmake(d,1); defSafe=true; break; }            // defender wins outright
        const lost=oppWins(depth-1); unmake(d,1);
        if(!lost){ defSafe=true; break; } }
      unmake(m,2);
      if(!defSafe){ res=true; break; }
    }
    solverTT.set(key,res); return res;
  }

  return function bestMove(board, me, timeMs){
    setup(board, me);
    const emp=[]; for(let c=0;c<CELLS;c++) if(!sB[c]) emp.push(c);
    if(emp.length===0) return null;
    if(emp.length===1) return emp[0];

    // 1) guaranteed win-in-1
    { const w=winCells(1); if(w.length) return w[0]; }
    // 2) guaranteed block-in-1
    { const ow=winCells(2);
      if(ow.length===1) return ow[0];
      if(ow.length>=2) return ow[0]; }           // lost (double threat already) — block one

    // 3) if WE have a forced threat-win, play a move that keeps it forced.
    { tssNodes=0; tssBudget=120000;
      if(tss(1, 8)){ // find first move of the forced win
        // prefer an immediate fork move; else a threatening move whose forced line still wins
        const tm = threatMoves(1);
        for(const [c] of tm){ const won=make(c,1);
          if(won){ unmake(c,1); return c; }
          const wc=winCells(1);
          if(wc.length>=2 && winCells(2).length===0){ unmake(c,1); return c; }
          if(wc.length===1 && winCells(2).length===0){ const w2=make(wc[0],2);
            let ok=false; if(!w2){ tssNodes=0; tssBudget=120000; ok=tss(1,7); }
            unmake(wc[0],2); unmake(c,1); if(ok) return c; continue; }
          unmake(c,1);
        }
      }
    }

    // 4) DEFENSE: refuse moves after which the opponent can force a win — first a
    //    fast threat-space gate, then a deeper AND-OR solver that also lets the
    //    attacker use quiet setup moves (catches the central-block zugzwang fork).
    sDeadline=Date.now()+timeMs;               // shared clock for gate + search
    const roots = rootMoves();
    let safe=[], unsafe=[];
    for(const c of roots){ make(c,1);
      const bad = oppHasForcedWin(9);
      unmake(c,1);
      (bad?unsafe:safe).push(c);
    }
    if(safe.length>1){                          // deeper solver only if a choice remains
      const s2=[]; solverTT=new Map(); solverNodes=0; solverBudget=400000;
      const gateDeadline=Date.now()+Math.min(timeMs, Math.max(300, timeMs*0.55));
      for(const c of safe){
        if(Date.now()>gateDeadline){ s2.push(c); continue; }   // out of gate time: keep as candidate
        make(c,1);
        solverNodes=0; sAbort=false;
        const bad = oppWins(4);
        const inconclusive = sAbort;
        unmake(c,1); sAbort=false;
        if(!bad) s2.push(c); else if(inconclusive) s2.push(c);  // only drop PROVEN-lost moves
      }
      if(s2.length) safe=s2;
    }
    const pool = safe.length? safe : unsafe;   // if everything loses, pick least-bad by search

    // 5) positional search over the chosen pool.
    sTT=new Map(); sDeadline=Date.now()+timeMs; sAbort=false; sNodes=0;
    let bestMove=pool[0], bestScore=-Infinity;
    const maxD=emp.length;
    for(let d=2; d<=maxD; d++){
      let lBest=null, lScore=-Infinity, a=-Infinity, b=Infinity;
      for(const c of orderList(pool, 1, bestMove)){
        const won=make(c,1);
        const s = won ? (WIN - sPly) : -nm(d-1, -b, -a, 2);
        unmake(c,1);
        if(sAbort) break;
        if(s>lScore){ lScore=s; lBest=c; if(s>a) a=s; }
      }
      if(!sAbort && lBest!=null){ bestMove=lBest; bestScore=lScore; }
      if(sAbort) break;
      if(bestScore>=WIN-100000) break;
      if(Date.now()>sDeadline) break;
    }
    return bestMove;
  };
}
const STRONG = createStrong({CELLS, LINES, LINES_BY_CELL, CELLW});
function chooseMoveStrong(){ const c=STRONG(board, CPU, 700); return c==null?null:c; }

function startingPlayer(){
  if(firstPref==='alt'){ const p=altNext; altNext=altNext==='R'?'B':'R'; return p; }
  return firstPref;
}
function reset(){
  board=new Array(CELLS).fill(null); winner=null; winLine=null; lastMove=null; busy=false;
  turn=startingPlayer();
  selected=-1; if(ghost) ghost.visible=false;
  refresh();
  if(mode==='cpu'&&turn===CPU){ busy=true; setTimeout(cpuMove,400); }
}
function place(c){
  if(winner||busy||board[c]) return;
  board[c]=turn; lastMove=c;
  const wl=wonLine(board,turn);
  if(wl){ winner=turn; winLine=wl; selected=-1; if(ghost) ghost.visible=false; refresh(); return; }
  if(board.every(Boolean)){ winner='draw'; refresh(); return; }
  turn=turn==='R'?'B':'R'; selected=-1; if(ghost) ghost.visible=false; refresh();
  if(mode==='cpu'&&turn===CPU){ busy=true; setTimeout(cpuMove,360); }
}
function cpuMove(){ const c=chooseMove(); busy=false; if(c!=null) place(c); }

function refresh(){ updateHud(); if(view==='2d') render2D(); else if(inited3D) render3D(); }
function updateHud(){
  const dot=document.getElementById('turnDot'),txt=document.getElementById('turnTxt'),
        mc=document.getElementById('moveCount'),hint=document.getElementById('hint');
  mc.textContent=`${board.filter(Boolean).length} / 64`;
  const name=p=> mode==='cpu' ? (p==='R'?'You':'Computer') : (p==='R'?'Red':'Blue');
  if(winner==='draw'){ dot.className='dot'; dot.style.background='#6b7689'; txt.textContent='Draw — cube full'; }
  else if(winner){ dot.className='dot '+(winner==='R'?'red':'blue'); txt.textContent=`${name(winner)} win${name(winner)==='You'?'':'s'}! 🎉`; }
  else { dot.className='dot '+(turn==='R'?'red':'blue');
    txt.textContent = mode==='cpu' ? (turn===CPU?'Computer thinking…':'Your move') : `${turn==='R'?'Red':'Blue'} to move`; }
  if(view==='3d'){
    hint.textContent = winner ? 'Drag to admire · New game to replay'
      : isTouch ? (selected>=0?'Tap the ghost ball again to drop':'Drag to rotate · tap a slot to aim')
                : 'Drag to rotate · hover a slot, click to drop';
  }
}

/* ===================== 2-D (SVG 3/4 view) ===================== */
const CX=60, DX=24, DY=-28, LZ=138, BASEX=56, BASEY=560, LIFT=15, R2=21;
const P=(gx,gy,z)=>({ x: BASEX+gx*CX+gy*DX, y: BASEY+gy*DY-z*LZ });
const svg=document.getElementById('svg');
function render2D(){
  let s = `<defs>
    <radialGradient id="gRed" cx="36%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffe2e5"/><stop offset="45%" stop-color="#ff5d6c"/><stop offset="100%" stop-color="#a51325"/>
    </radialGradient>
    <radialGradient id="gBlue" cx="36%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#dcefff"/><stop offset="45%" stop-color="#5db6ff"/><stop offset="100%" stop-color="#155a9c"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bsh" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.45"/>
    </filter></defs>`;
  for(let z=0; z<N; z++){
    const c00=P(0,0,z), c40=P(N,0,z), c44=P(N,N,z), c04=P(0,N,z);
    s += `<polygon class="layerfill" points="${c00.x},${c00.y} ${c40.x},${c40.y} ${c44.x},${c44.y} ${c04.x},${c04.y}"/>`;
    for(let g=0; g<=N; g++){
      const a=P(g,0,z), b=P(g,N,z); s += `<line class="gridline" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"/>`;
      const d=P(0,g,z), e=P(N,g,z); s += `<line class="gridline" x1="${d.x}" y1="${d.y}" x2="${e.x}" y2="${e.y}"/>`;
    }
    const lab=P(0,0,z); s += `<text class="layerlabel" x="${lab.x-30}" y="${lab.y}">${z+1}</text>`;
  }
  const order=[]; for(let z=0;z<N;z++) for(let j=N-1;j>=0;j--) for(let i=0;i<N;i++) order.push([i,j,z]);
  const winSet = winLine ? new Set(winLine) : null;
  for(const [i,j,z] of order){
    const c=idx(i,j,z); const seat=P(i+0.5,j+0.5,z); const cx=seat.x, cy=seat.y-LIFT;
    s += `<ellipse class="seat" cx="${seat.x}" cy="${seat.y}" rx="${R2*0.78}" ry="${R2*0.34}"/>`;
    if(board[c]){
      const grad = board[c]==='R' ? 'gRed' : 'gBlue'; const win = winSet && winSet.has(c);
      s += `<circle class="ball" cx="${cx}" cy="${cy}" r="${R2}" fill="url(#${grad})" filter="url(#bsh)"
              stroke="${win?'#ffe27a':(c===lastMove?'#ffffff':'none')}" stroke-opacity="${win?0.95:0.65}" stroke-width="${win?3:2}"/>`;
      s += `<ellipse cx="${cx-R2*0.28}" cy="${cy-R2*0.34}" rx="${R2*0.34}" ry="${R2*0.2}" fill="#fff" fill-opacity="0.45"/>`;
    } else {
      s += `<circle class="spot" cx="${cx}" cy="${cy}" r="3.2"/>`;
      if(!winner && !(mode==='cpu' && turn===CPU))
        s += `<circle class="hit" data-c="${c}" cx="${cx}" cy="${cy}" r="${R2+5}"/>`;
    }
  }
  if(winLine){
    const a=P((winLine[0]%4)+0.5,(Math.floor(winLine[0]/4)%4)+0.5,Math.floor(winLine[0]/16));
    const b=P((winLine[3]%4)+0.5,(Math.floor(winLine[3]/4)%4)+0.5,Math.floor(winLine[3]/16));
    s += `<line class="winline" x1="${a.x}" y1="${a.y-LIFT}" x2="${b.x}" y2="${b.y-LIFT}"/>`;
  }
  svg.innerHTML=s;
  svg.querySelectorAll('.hit').forEach(el=> el.addEventListener('pointerdown', e=>{ e.preventDefault(); place(+el.dataset.c); }));
}

/* ===================== 3-D (three.js) — lazily loaded ===================== */
const COL={ R:0xff5d6c, B:0x5db6ff };
const FADE_MAX=0.30, FADE_EXP=1.7;   // line-family fade tuning
let THREE, OrbitControls, inited3D=false, three3D=null;
let scene, camera, renderer, controls, ray, ndc, ghost, winTube=null;
let sphereGeo, latGroups=[], hitMeshes=[], slotMeshes=[], ballMeshes=new Array(CELLS).fill(null);
const HOME=[5.2,4.2,6.0];

async function init3D(){
  const hint=document.getElementById('hint'); hint.textContent='Loading 3-D…';
  THREE = await import('three');
  ({ OrbitControls } = await import('three/addons/controls/OrbitControls.js'));
  const stage=document.getElementById('stage');
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  stage.appendChild(renderer.domElement);
  scene=new THREE.Scene(); scene.background=new THREE.Color(0x0c0e12);
  camera=new THREE.PerspectiveCamera(42,1,0.1,100); camera.position.set(...HOME);
  scene.add(new THREE.AmbientLight(0xffffff,0.65));
  const dl=new THREE.DirectionalLight(0xffffff,1.15); dl.position.set(6,9,7); scene.add(dl);
  const dl2=new THREE.DirectionalLight(0x9fc4ff,0.35); dl2.position.set(-6,-3,-5); scene.add(dl2);

  controls=new OrbitControls(camera, renderer.domElement);
  controls.enableDamping=true; controls.dampingFactor=0.08; controls.enablePan=false;
  controls.minDistance=4.5; controls.maxDistance=14; controls.rotateSpeed=0.9;

  const W=(i,j,z)=>new THREE.Vector3((i-1.5),(z-1.5),(j-1.5)); // x=i, y=layer(up), z=depth(j)

  // three line families, each fades when it turns edge-on to the camera
  function lineFamily(segs, axisDir){
    const g=new THREE.BufferGeometry().setFromPoints(segs);
    const m=new THREE.LineBasicMaterial({color:0xbcccdf, transparent:true, opacity:FADE_MAX});
    const ls=new THREE.LineSegments(g,m); scene.add(ls);
    latGroups.push({mat:m, dir:new THREE.Vector3(...axisDir)});
  }
  const xs=[], zs=[], ys=[];
  for(let a=0;a<N;a++) for(let b=0;b<N;b++){
    xs.push(W(0,a,b),W(3,a,b));   // along i  -> world X
    zs.push(W(a,0,b),W(a,3,b));   // along j  -> world Z (depth)
    ys.push(W(a,b,0),W(a,b,3));   // along layer -> world Y (vertical)
  }
  lineFamily(xs,[1,0,0]); lineFamily(zs,[0,0,1]); lineFamily(ys,[0,1,0]);

  sphereGeo=new THREE.SphereGeometry(0.34,32,24);
  const slotGeo=new THREE.SphereGeometry(0.07,12,10), hitGeo=new THREE.SphereGeometry(0.32,10,8);
  const slotMat=new THREE.MeshStandardMaterial({color:0x8c98ab,transparent:true,opacity:0.32,roughness:.9});
  const hitMat=new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false});
  for(let c=0;c<CELLS;c++){
    const [i,j,z]=cellIJZ(c), p=W(i,j,z);
    const slot=new THREE.Mesh(slotGeo,slotMat); slot.position.copy(p); scene.add(slot); slotMeshes.push(slot);
    const hit=new THREE.Mesh(hitGeo,hitMat); hit.position.copy(p); hit.userData.cell=c; scene.add(hit); hitMeshes.push(hit);
  }
  ghost=new THREE.Mesh(sphereGeo,new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.4,roughness:.3,metalness:.1}));
  ghost.visible=false; scene.add(ghost);

  ray=new THREE.Raycaster(); ndc=new THREE.Vector2();
  three3D={W};
  bindPointer();
  inited3D=true;
  resize3D();
  loop();
}

function addBall(c){
  const [i,j,z]=cellIJZ(c);
  const m=new THREE.Mesh(sphereGeo,new THREE.MeshStandardMaterial({color:COL[board[c]],roughness:0.32,metalness:0.12}));
  m.position.copy(three3D.W(i,j,z)); scene.add(m); ballMeshes[c]=m; slotMeshes[c].visible=false;
}
function render3D(){
  // sync balls with board
  for(let c=0;c<CELLS;c++){
    if(board[c] && !ballMeshes[c]) addBall(c);
    else if(!board[c] && ballMeshes[c]){ scene.remove(ballMeshes[c]); ballMeshes[c]=null; slotMeshes[c].visible=true; }
  }
  // winning highlight
  const winSet = winLine ? new Set(winLine) : null;
  for(let c=0;c<CELLS;c++){ if(ballMeshes[c]){
    const on = winSet && winSet.has(c);
    ballMeshes[c].material.emissive = new THREE.Color(on?0xffc83a:0x000000);
    ballMeshes[c].material.emissiveIntensity = on?0.6:0;
  }}
  if(winTube){ scene.remove(winTube); winTube=null; }
  if(winLine){
    const [i0,j0,z0]=cellIJZ(winLine[0]), [i3,j3,z3]=cellIJZ(winLine[3]);
    const a=three3D.W(i0,j0,z0), b=three3D.W(i3,j3,z3), dir=new THREE.Vector3().subVectors(b,a), len=dir.length();
    winTube=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,len,16),
      new THREE.MeshStandardMaterial({color:0xffe27a,emissive:0xffb000,emissiveIntensity:0.9}));
    winTube.position.copy(a).add(b).multiplyScalar(0.5);
    winTube.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
    scene.add(winTube);
  }
}

/* picking + ghost */
let isTouch=false, selected=-1, down=null;
function pickCell(ev){
  const r=renderer.domElement.getBoundingClientRect();
  ndc.x=((ev.clientX-r.left)/r.width)*2-1; ndc.y=-((ev.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(ndc,camera);
  for(const h of ray.intersectObjects(hitMeshes,false)){ const c=h.object.userData.cell; if(!board[c]) return c; }
  return -1;
}
function setGhost(c){ if(c<0){ ghost.visible=false; return; }
  const [i,j,z]=cellIJZ(c); ghost.position.copy(three3D.W(i,j,z)); ghost.material.color.set(COL[turn]); ghost.visible=true; }
function bindPointer(){
  const el=renderer.domElement;
  el.addEventListener('pointermove',e=>{
    if(e.pointerType!=='mouse'||down) return;
    if(winner||busy||(mode==='cpu'&&turn===CPU)){ ghost.visible=false; return; }
    setGhost(pickCell(e));
  });
  el.addEventListener('pointerdown',e=>{ down={x:e.clientX,y:e.clientY,t:performance.now(),type:e.pointerType}; });
  el.addEventListener('pointerup',e=>{
    const d=down; down=null; if(!d) return;
    if(Math.hypot(e.clientX-d.x,e.clientY-d.y)>7 || performance.now()-d.t>500) return;  // drag → orbit
    if(winner||busy||(mode==='cpu'&&turn===CPU)) return;
    isTouch = d.type!=='mouse';
    const c=pickCell(e);
    if(c<0){ if(isTouch){ selected=-1; ghost.visible=false; updateHud(); } return; }
    if(!isTouch){ place(c); return; }
    if(c===selected) place(c); else { selected=c; setGhost(c); updateHud(); }
  });
}
function resize3D(){
  const stage=document.getElementById('stage'); const w=stage.clientWidth, h=stage.clientHeight;
  if(!w||!h) return;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
const _cd=()=>camera.position.clone().sub(controls.target).normalize();
function loop(){
  requestAnimationFrame(loop);
  if(view!=='3d'||!inited3D) return;
  controls.update();
  const cd=_cd();
  for(const g of latGroups){ const a=Math.abs(g.dir.dot(cd)); g.mat.opacity=FADE_MAX*Math.pow(1-a,FADE_EXP); }
  renderer.render(scene,camera);
}

/* ===================== view switching + controls ===================== */
async function setView(v){
  view=v;
  document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.toggle('on', x.dataset.view===v));
  document.getElementById('resetView').classList.toggle('hidden', v!=='3d');
  if(v==='3d'){
    svg.classList.add('hidden'); document.getElementById('stage').classList.remove('hidden');
    if(!inited3D){ try{ await init3D(); }catch(err){ setView('2d'); return; } }
    resize3D(); render3D();
  } else {
    document.getElementById('stage').classList.add('hidden'); svg.classList.remove('hidden');
    render2D();
  }
  updateHud();
}

document.getElementById('viewSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) setView(b.dataset.view); });
document.getElementById('modeSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return;
  mode=b.dataset.mode; document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.toggle('on',x===b));
  const d=document.getElementById('diffSeg'); d.style.opacity=mode==='cpu'?1:.4; d.style.pointerEvents=mode==='cpu'?'auto':'none';
  reset(); });
document.getElementById('diffSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return;
  diff=b.dataset.diff; document.querySelectorAll('#diffSeg button').forEach(x=>x.classList.toggle('on',x===b)); });
document.getElementById('firstSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return;
  firstPref=b.dataset.first; altNext='R'; document.querySelectorAll('#firstSeg button').forEach(x=>x.classList.toggle('on',x===b)); reset(); });
document.getElementById('newBtn').addEventListener('click',reset);
document.getElementById('resetView').addEventListener('click',()=>{ if(controls){ controls.reset(); camera.position.set(...HOME); } });
addEventListener('resize',()=>{ if(view==='3d'&&inited3D) resize3D(); });

reset();
setView(new URLSearchParams(location.search).get('view')==='2d' ? '2d' : '3d');
</script>
